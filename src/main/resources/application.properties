spring.application.name=tangerine

# 데이터베이스 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/tangerine?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=100-200-400
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT 비밀 키 설정
# jwt.secret 값은 코드에 직접 들어가면 안 되기 때문에 배포 단계에서 환경 변수로 이동할 예정
# 액세스 토큰 만료 시간: 30분, 리프레시 토큰 만료 시간: 7일
jwt.secret=tangerine-secret-key-for-jwt-signing-must-be-at-least-256-bits-long
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000